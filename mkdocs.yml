site_name: Pāṇini
site_url: https://yro7.github.io/panini/
site_description: LLM-powered morphological feature extraction framework.

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Quick Start:
      - CLI: guides/cli.md
      - Python: guides/python.md
      - Rust: guides/rust.md
  - 🌍 Languages:
      - Introduction: languages/index.md
      - Adding a Language: languages/adding.md
      - Agglutination: languages/agglutination.md
  - 🧩 Analysis Components:
      - Roles & Principles: components/index.md
      - Creating a Component: components/creating.md
      - Validation Pipeline: components/pipeline.md
  - 📊 Aggregation & Statistics:
      - The Aggregable Concept: aggregation/index.md
      - Working with Digests: aggregation/digests.md
      - Custom Aggregations: aggregation/custom.md

extra_css:
  - https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js
