# ── Panini CLI — Example Configuration ──────────────────────────────────────
# Copy this file, fill in your values, then:
#   panini extract --config panini.toml --text "..." --target "..."

# ── Provider ─────────────────────────────────────────────────────────────────
# Supported values: "openai" | "anthropic" | "google"
provider = "openai"

# Model identifier as expected by the provider's API.
#
#   OpenAI    → "gpt-4o", "gpt-4o-mini", "o3-mini", …
#   Anthropic → "claude-3-5-sonnet-20241022", "claude-opus-4-5", …
#   Google    → "gemini-2.0-flash", "gemini-2.5-pro-preview-03-25", …
model = "gpt-4o"

# ── Language ─────────────────────────────────────────────────────────────────
# ISO 639-3 code. Run `panini languages` to list supported values.
# Currently supported: pol | tur | ara
language = "pol"

# ── API Key ──────────────────────────────────────────────────────────────────
# Option A — reference an environment variable (recommended)
api_key = "${OPENAI_API_KEY}"
# api_key = "${ANTHROPIC_API_KEY}"
# api_key = "${GEMINI_API_KEY}"

# Option B — inline value (not recommended for shared configs)
# api_key = "sk-..."

# ── Prompts ──────────────────────────────────────────────────────────────────
# Path to the prompts YAML file (relative to where you run the command,
# or an absolute path).
prompts_file = "panini-cli/prompts/default.yml"

# ── Optional ─────────────────────────────────────────────────────────────────
# Custom API base URL (useful for proxies or local deployments)
# base_url = "https://my-proxy.example.com/v1"
