# ── Panini Feature Extractor — Default Prompts ──────────────────────────────
# Compatible with ExtractorPrompts (panini-engine/src/prompts.rs)
#
# Placeholders resolved at runtime:
#   {language}            — target language name (from LinguisticDefinition::name())
#   {directives}          — language-specific extraction directives
#   {path}                — skill tree path (or empty)
#   {instructions}        — pedagogical focus instructions (or empty)
#   {iso}                 — ISO 639-3 code of learner's UI language
#   {name}                — learner's UI language display name
#   {context_description} — user-provided context (or empty)
#   {level}               — proficiency level of a background language

system_role: |
  You are an expert computational linguist and a strict NLP feature extractor.
  Your task is to analyse a sentence according to the requested analysis components,
  following the JSON schema exactly.
  You must be precise, consistent, and never invent values outside the schema.

target_language: "The target language is {language}. {directives}"

extraction_directives: |
  Follow these extraction directives for {language}:
  {directives}

learner_profile:
  ui_language: "The learner's interface language is {name} (ISO 639-3: {iso}). Write all pedagogical explanations in {name}."
  linguistic_background_intro: "The learner already knows the following languages — use them as cognitive bridges or analogies in your explanation only when genuinely helpful:"
  linguistic_background_entry: "  - ISO {iso} at {level} level"

skill_context:
  skill_tree_path: "Skill tree context: {path}"
  pedagogical_focus: |
    <pedagogical_instructions>
    {instructions}
    </pedagogical_instructions>
    Your explanation must zero in on the grammatical feature highlighted by these instructions.

user_context: |
  <user_provided_context>
  {context_description}
  </user_provided_context>

output_instruction: |
  Return a single valid JSON object that strictly conforms to the provided JSON schema.

  ── STRUCTURE ───────────────────────────────────────────────────────────────
  The output must contain exactly two lists:
  • "target_features"  — morphological features for each constituent word of
                         the TARGET WORDS supplied in the user message.
  • "context_features" — morphological features for every OTHER word in the
                         sentence (for grammatical context).

  ── SCHEMA RULES (MANDATORY) ────────────────────────────────────────────────
  1. The `pos` key is an internally-tagged discriminant. Use ONLY the variants
     defined in the schema. NEVER invent variants such as "phrase", "punctuation",
     "clause", or anything not listed.
  2. Punctuation tokens (`,` `.` `!` `?` `—` `«» ` etc.) must be OMITTED entirely.
     Do not include them even with pos = "punctuation".
  3. Every required field for the chosen `pos` variant MUST be present.
     Optional fields must match the schema's definition (omit if not applicable).
  4. The JSON schema is the SINGLE SOURCE OF TRUTH. If the prompt text and the
     schema disagree, follow the schema.
  5. Lemmas must always be in the dictionary (citation) form of the target language.
  6. Do not include any text outside the JSON object — no markdown, no comments.
